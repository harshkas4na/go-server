version: '3.8'

services:
  my-postgres:
    image: postgres:16
    environment:
      # Fixed the extra 'S' in POSTGRES
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # OPTIONAL: Uncomment the line below if you want to auto-create your table
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Using 'my-postgres' because that is the service name above
      - DATABASE_URL=postgres://myuser:mypassword@my-postgres:5432/mydb
    depends_on:
      - my-postgres

# This is the part that was missing! 
# You must define named volumes at the bottom.
volumes:
  pgdata: